name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  golangci-lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Test & Coverage Gate
    needs: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go coverage gate
        run: ./scripts/check-go-coverage.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Frontend coverage gate
        run: ./scripts/check-frontend-coverage.sh

  build-frontend:
    name: Build Frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/

  build-linux:
    name: Build Linux amd64
    needs: [build-frontend, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk/

      - name: Copy frontend for Go embed
        run: |
          rm -rf internal/frontend/dist
          mkdir -p internal/frontend/dist
          cp public/index.html internal/frontend/dist/
          cp public/*.js public/*.css internal/frontend/dist/ 2>/dev/null || true
          cp public/manifest-*.json public/sw.js internal/frontend/dist/ 2>/dev/null || true
          cp -r public/assets internal/frontend/dist/assets 2>/dev/null || true
          mkdir -p internal/frontend/dist/assets
          cp android-apk/clawbench-android.apk internal/frontend/dist/assets/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Linux binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -tags "fts5" -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench-linux ./cmd/server
          echo "Built with CGO_ENABLED=1: dynamically linked, SQLite FTS5/RAG enabled"

      - name: Verify Linux binary
        run: |
          file clawbench-linux
          ldd clawbench-linux

      - name: Package Linux
        run: |
          mkdir -p pkg-linux/clawbench
          cp clawbench-linux pkg-linux/clawbench/clawbench
          cp -r config pkg-linux/clawbench/config
          chmod +x pkg-linux/clawbench/clawbench
          cd pkg-linux && zip -r clawbench-linux-amd64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-linux/clawbench-linux-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: pkg-linux/clawbench/
          include-hidden-files: true

  build-linux-arm64:
    name: Build Linux arm64
    needs: [build-frontend, build-android]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk/

      - name: Copy frontend for Go embed
        run: |
          rm -rf internal/frontend/dist
          mkdir -p internal/frontend/dist
          cp public/index.html internal/frontend/dist/
          cp public/*.js public/*.css internal/frontend/dist/ 2>/dev/null || true
          cp public/manifest-*.json public/sw.js internal/frontend/dist/ 2>/dev/null || true
          cp -r public/assets internal/frontend/dist/assets 2>/dev/null || true
          mkdir -p internal/frontend/dist/assets
          cp android-apk/clawbench-android.apk internal/frontend/dist/assets/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Linux arm64 binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -tags "fts5" -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench-linux-arm64 ./cmd/server
          echo "Built with CGO_ENABLED=1: dynamically linked, SQLite FTS5/RAG enabled"

      - name: Verify Linux arm64 binary
        run: |
          file clawbench-linux-arm64
          ldd clawbench-linux-arm64

      - name: Package Linux arm64
        run: |
          mkdir -p pkg-linux-arm64/clawbench
          cp clawbench-linux-arm64 pkg-linux-arm64/clawbench/clawbench
          cp -r config pkg-linux-arm64/clawbench/config
          chmod +x pkg-linux-arm64/clawbench/clawbench
          cd pkg-linux-arm64 && zip -r clawbench-linux-arm64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-linux-arm64/clawbench-linux-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-package
          path: pkg-linux-arm64/clawbench/
          include-hidden-files: true

  build-windows:
    name: Build Windows amd64
    needs: [build-frontend, build-android]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk/

      - name: Copy frontend for Go embed
        shell: pwsh
        run: |
          if (Test-Path internal/frontend/dist) { Remove-Item -Recurse -Force internal/frontend/dist }
          New-Item -ItemType Directory -Force -Path internal/frontend/dist | Out-Null
          Copy-Item public/index.html internal/frontend/dist/
          Copy-Item public/*.js internal/frontend/dist/ -ErrorAction SilentlyContinue
          Copy-Item public/*.css internal/frontend/dist/ -ErrorAction SilentlyContinue
          Copy-Item public/manifest-*.json internal/frontend/dist/ -ErrorAction SilentlyContinue
          Copy-Item public/sw.js internal/frontend/dist/ -ErrorAction SilentlyContinue
          if (Test-Path public/assets) { Copy-Item -Recurse public/assets internal/frontend/dist/assets }
          New-Item -ItemType Directory -Force -Path internal/frontend/dist/assets | Out-Null
          Copy-Item android-apk/clawbench-android.apk internal/frontend/dist/assets/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Windows binary
        env:
          CGO_ENABLED: 1
        run: |
          $VERSION = if (git describe --tags --always 2>$null) { git describe --tags --always } else { "dev" }
          go build -tags "fts5" -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench.exe ./cmd/server

      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg-windows/clawbench
          Copy-Item clawbench.exe pkg-windows/clawbench/
          Copy-Item -Recurse config pkg-windows/clawbench/config
          Compress-Archive -Path pkg-windows/clawbench -DestinationPath pkg-windows/clawbench-windows-amd64.zip

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-windows/clawbench-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: pkg-windows/clawbench/

  build-macos-arm64:
    name: Build macOS arm64
    needs: [build-frontend, build-android]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk/

      - name: Copy frontend for Go embed
        run: |
          rm -rf internal/frontend/dist
          mkdir -p internal/frontend/dist
          cp public/index.html internal/frontend/dist/
          cp public/*.js public/*.css internal/frontend/dist/ 2>/dev/null || true
          cp public/manifest-*.json public/sw.js internal/frontend/dist/ 2>/dev/null || true
          cp -r public/assets internal/frontend/dist/assets 2>/dev/null || true
          mkdir -p internal/frontend/dist/assets
          cp android-apk/clawbench-android.apk internal/frontend/dist/assets/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build macOS arm64 binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -tags "fts5" -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench-darwin-arm64 ./cmd/server

      - name: Package macOS arm64
        run: |
          mkdir -p pkg-mac-arm64/clawbench
          cp clawbench-darwin-arm64 pkg-mac-arm64/clawbench/clawbench
          cp -r config pkg-mac-arm64/clawbench/config
          chmod +x pkg-mac-arm64/clawbench/clawbench
          cd pkg-mac-arm64 && zip -r clawbench-darwin-arm64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-mac-arm64/clawbench-darwin-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-package
          path: pkg-mac-arm64/clawbench/

  build-macos-amd64:
    name: Build macOS amd64
    needs: [build-frontend, build-android]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: android-apk/

      - name: Copy frontend for Go embed
        run: |
          rm -rf internal/frontend/dist
          mkdir -p internal/frontend/dist
          cp public/index.html internal/frontend/dist/
          cp public/*.js public/*.css internal/frontend/dist/ 2>/dev/null || true
          cp public/manifest-*.json public/sw.js internal/frontend/dist/ 2>/dev/null || true
          cp -r public/assets internal/frontend/dist/assets 2>/dev/null || true
          mkdir -p internal/frontend/dist/assets
          cp android-apk/clawbench-android.apk internal/frontend/dist/assets/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build macOS amd64 binary (cross-compile on arm64)
        env:
          CGO_ENABLED: 1
          GOARCH: amd64
          CC: clang -target x86_64-apple-macos13.0
          CXX: clang++ -target x86_64-apple-macos13.0
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -tags "fts5" -ldflags="-s -w -X clawbench/internal/version.Version=$VERSION" -o clawbench-darwin-amd64 ./cmd/server

      - name: Package macOS amd64
        run: |
          mkdir -p pkg-mac-amd64/clawbench
          cp clawbench-darwin-amd64 pkg-mac-amd64/clawbench/clawbench
          cp -r config pkg-mac-amd64/clawbench/config
          chmod +x pkg-mac-amd64/clawbench/clawbench
          cd pkg-mac-amd64 && zip -r clawbench-darwin-amd64.zip clawbench/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: pkg-mac-amd64/clawbench-darwin-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64-package
          path: pkg-mac-amd64/clawbench/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/clawbench.jks

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_FILE: ../clawbench.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME=$(git describe --tags --always 2>/dev/null || echo "dev")
          ./gradlew assembleRelease -PversionCode=$VERSION_CODE -PversionName=$VERSION_NAME

      - name: Upload APK artifact (for inclusion in platform packages)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/clawbench-android.apk

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            android/app/build/outputs/apk/release/clawbench-android.apk

  docker:
    name: Build & Push Docker Image
    needs: [build-linux, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: pkg-linux/clawbench/

      - name: Prepare Docker build context
        run: |
          cp pkg-linux/clawbench/clawbench .
          chmod +x ./clawbench

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check package visibility
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORG="${GITHUB_REPOSITORY_OWNER}"
          PKG_SLUG="clawbench"
          SETTINGS_URL="https://github.com/orgs/${ORG}/packages/container/${PKG_SLUG}/settings"
          ORG_PACKAGES_URL="https://github.com/orgs/${ORG}/settings/packages"

          # GitHub has no API to change package visibility — this can only be
          # done via the web UI.  We check and warn if the package is private.
          VISIBILITY=$(gh api "/orgs/${ORG}/packages/container/${PKG_SLUG}" --jq '.visibility' 2>/dev/null || echo "not_found")

          if [ "$VISIBILITY" = "public" ]; then
            echo "✅ Package is already public"
          elif [ "$VISIBILITY" = "private" ]; then
            echo "::warning::Docker image package is PRIVATE. Users cannot pull without authentication. Fix: ${SETTINGS_URL} → Danger Zone → Change visibility → Public. To make this permanent: ${ORG_PACKAGES_URL} → Package Creation → Public."
          else
            echo "::warning::Could not determine package visibility. If it's private, set it to public at: ${SETTINGS_URL}"
          fi

  publish-npm:
    name: Publish to npm
    needs: [build-frontend, build-linux, build-linux-arm64, build-windows, build-macos-arm64, build-macos-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # 去掉 v 前缀（npm 语义化版本不允许 v 前缀）
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: pkg-linux/clawbench/

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-package
          path: pkg-linux-arm64/clawbench/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: pkg-windows/clawbench/

      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-package
          path: pkg-mac-arm64/clawbench/

      - name: Download macOS amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: macos-amd64-package
          path: pkg-mac-amd64/clawbench/

      - name: Assemble npm platform packages
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Assembling npm packages for version: $VERSION"

          # --- @xulongzhe/clawbench-linux-x64 ---
          PLATFORM_DIR="npm/platforms/linux-x64"
          mkdir -p "$PLATFORM_DIR/bin"
          cp pkg-linux/clawbench/clawbench "$PLATFORM_DIR/bin/clawbench"
          chmod +x "$PLATFORM_DIR/bin/clawbench"
          cp -r config "$PLATFORM_DIR/config"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('$PLATFORM_DIR/package.json','utf8'));p.version='$VERSION';fs.writeFileSync('$PLATFORM_DIR/package.json',JSON.stringify(p,null,2)+'\n')"

          # --- @xulongzhe/clawbench-linux-arm64 ---
          PLATFORM_DIR="npm/platforms/linux-arm64"
          mkdir -p "$PLATFORM_DIR/bin"
          cp pkg-linux-arm64/clawbench/clawbench "$PLATFORM_DIR/bin/clawbench"
          chmod +x "$PLATFORM_DIR/bin/clawbench"
          cp -r config "$PLATFORM_DIR/config"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('$PLATFORM_DIR/package.json','utf8'));p.version='$VERSION';fs.writeFileSync('$PLATFORM_DIR/package.json',JSON.stringify(p,null,2)+'\n')"

          # --- @xulongzhe/clawbench-darwin-x64 ---
          PLATFORM_DIR="npm/platforms/darwin-x64"
          mkdir -p "$PLATFORM_DIR/bin"
          cp pkg-mac-amd64/clawbench/clawbench "$PLATFORM_DIR/bin/clawbench"
          chmod +x "$PLATFORM_DIR/bin/clawbench"
          cp -r config "$PLATFORM_DIR/config"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('$PLATFORM_DIR/package.json','utf8'));p.version='$VERSION';fs.writeFileSync('$PLATFORM_DIR/package.json',JSON.stringify(p,null,2)+'\n')"

          # --- @xulongzhe/clawbench-darwin-arm64 ---
          PLATFORM_DIR="npm/platforms/darwin-arm64"
          mkdir -p "$PLATFORM_DIR/bin"
          cp pkg-mac-arm64/clawbench/clawbench "$PLATFORM_DIR/bin/clawbench"
          chmod +x "$PLATFORM_DIR/bin/clawbench"
          cp -r config "$PLATFORM_DIR/config"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('$PLATFORM_DIR/package.json','utf8'));p.version='$VERSION';fs.writeFileSync('$PLATFORM_DIR/package.json',JSON.stringify(p,null,2)+'\n')"

          # --- @xulongzhe/clawbench-win32-x64 ---
          PLATFORM_DIR="npm/platforms/win32-x64"
          mkdir -p "$PLATFORM_DIR/bin"
          cp pkg-windows/clawbench/clawbench.exe "$PLATFORM_DIR/bin/clawbench.exe"
          cp -r config "$PLATFORM_DIR/config"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('$PLATFORM_DIR/package.json','utf8'));p.version='$VERSION';fs.writeFileSync('$PLATFORM_DIR/package.json',JSON.stringify(p,null,2)+'\n')"

          # --- Update main package ---
          MAIN_DIR="npm/main"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('$MAIN_DIR/package.json','utf8'));p.version='$VERSION';for(const d in p.optionalDependencies)p.optionalDependencies[d]='$VERSION';fs.writeFileSync('$MAIN_DIR/package.json',JSON.stringify(p,null,2)+'\n')"

          echo "All npm packages assembled"

      - name: Publish @xulongzhe/clawbench-linux-x64
        run: npm publish npm/platforms/linux-x64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @xulongzhe/clawbench-linux-arm64
        run: npm publish npm/platforms/linux-arm64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @xulongzhe/clawbench-darwin-x64
        run: npm publish npm/platforms/darwin-x64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @xulongzhe/clawbench-darwin-arm64
        run: npm publish npm/platforms/darwin-arm64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @xulongzhe/clawbench-win32-x64
        run: npm publish npm/platforms/win32-x64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package (@xulongzhe/clawbench)
        run: npm publish npm/main --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-notes:
    name: Generate Release Notes
    needs: [build-linux, build-linux-arm64, build-windows, build-macos-arm64, build-macos-amd64, build-android, docker, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, generating default notes"
            gh release edit "$TAG" --generate-notes
            exit 0
          fi

          NOTES=""

          # Helper: extract categorized commits with hashes
          # Format: "hash subject" — strip conventional prefix for display

          # 🚀 Features
          FEATS=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ (feat|feature)\b" || true)
          if [ -n "$FEATS" ]; then
            NOTES="${NOTES}## 🚀 新特性\n\n"
            while IFS= read -r line; do
              HASH=$(echo "$line" | cut -d' ' -f1)
              DESC=$(echo "$line" | sed -E 's/^[0-9a-f]+ (feat|feature)(\(.+\))?:\s*//')
              NOTES="${NOTES}- ${DESC} (${HASH})\n"
            done <<< "$FEATS"
            NOTES="${NOTES}\n"
          fi

          # 🐛 Bug Fixes
          FIXES=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ fix\b" || true)
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}## 🐛 问题修复\n\n"
            while IFS= read -r line; do
              HASH=$(echo "$line" | cut -d' ' -f1)
              DESC=$(echo "$line" | sed -E 's/^[0-9a-f]+ fix(\(.+\))?:\s*//')
              NOTES="${NOTES}- 修复了 ${DESC} (${HASH})\n"
            done <<< "$FIXES"
            NOTES="${NOTES}\n"
          fi

          # ⚡ Performance
          PERFS=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ perf\b" || true)
          if [ -n "$PERFS" ]; then
            NOTES="${NOTES}## ⚡ 性能优化\n\n"
            while IFS= read -r line; do
              HASH=$(echo "$line" | cut -d' ' -f1)
              DESC=$(echo "$line" | sed -E 's/^[0-9a-f]+ perf(\(.+\))?:\s*//')
              NOTES="${NOTES}- ${DESC} (${HASH})\n"
            done <<< "$PERFS"
            NOTES="${NOTES}\n"
          fi

          # 🔧 Internal
          INTERNAL=$(git log "${PREV_TAG}..${TAG}" --format="%h %s" | grep -iE "^[0-9a-f]+ (refactor|chore|style|ci|build)\b" || true)
          if [ -n "$INTERNAL" ]; then
            NOTES="${NOTES}## 🔧 内部改进\n\n"
            COUNT=$(echo "$INTERNAL" | wc -l)
            NOTES="${NOTES}- ${COUNT} 项内部改进（重构、依赖更新、代码风格等）\n\n"
          fi

          # 💥 Breaking Changes
          BREAKING=$(git log "${PREV_TAG}..${TAG}" --format="%B" | grep -i "BREAKING CHANGE" || true)
          if [ -n "$BREAKING" ]; then
            NOTES="${NOTES}## 💥 破坏性变更\n\n"
            NOTES="${NOTES}${BREAKING}\n\n"
          fi

          NOTES="${NOTES}---\n\n**完整变更日志**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}\n"

          # Write notes to file and update release
          printf '%b\n' "$NOTES" > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md
